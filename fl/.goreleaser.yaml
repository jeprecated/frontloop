version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: fl
    main: ./cmd/fl
    binary: fl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

brews:
  - repository:
      owner: ohare93
      name: tap
    directory: Formula
    homepage: https://github.com/ohare93/frontloop
    description: CLI for managing frontloop task queues
    license: MIT
    test: |
      system "#{bin}/fl", "--version"

scoops:
  - repository:
      owner: ohare93
      name: scoop
    directory: bucket
    homepage: https://github.com/ohare93/frontloop
    description: CLI for managing frontloop task queues
    license: MIT
