name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/fl

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: apps/fl/go.sum

      - name: Run tests
        run: go test -v ./...

      - name: Run tests with race detection
        if: matrix.os == 'ubuntu-latest'
        run: go test -v -race ./...

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: apps/fl/go.sum

      - name: Build
        run: go build -o fl${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/fl

      - name: Verify binary runs (Unix)
        if: matrix.os != 'windows-latest'
        run: ./fl --version

      - name: Verify binary runs (Windows)
        if: matrix.os == 'windows-latest'
        run: .\fl.exe --version

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: apps/fl/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: apps/fl
